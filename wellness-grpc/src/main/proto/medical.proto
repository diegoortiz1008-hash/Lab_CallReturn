syntax = "proto3";

option java_multiple_files = true;
option java_package = "edu.eci.arsw.wellness.medical";

service MedicalService {
    rpc GetSpecialties (Empty) returns (SpecialtyList);
    rpc GetSpecialty (SpecialtyRequest) returns (SpecialtyResponse);
}

message Empty {
}

message SpecialtyRequest {
    string code = 1;
}

message Specialty {
    string code = 1;
    string name = 2;
    bool available = 3;
}

message SpecialtyList {
    repeated Specialty specialties = 1;
}

message SpecialtyResponse {
    bool found = 1;
    Specialty specialty = 2;
}