syntax = "proto3";

option java_multiple_files = true;
option java_package = "edu.eci.arsw.eciencia.agenda";

service AgendaService {
    rpc GetAgenda (AgendaEmpty) returns (ActivityList);
    rpc GetActivitiesByTimeSlot (TimeSlotRequest) returns (ActivityList);
    rpc GetActivity (ActivityRequest) returns (ActivityResponse);
}

message AgendaEmpty {
}

message TimeSlotRequest {
    string timeSlot = 1;
}

message ActivityRequest {
    string activityId = 1;
}

message Activity {
    string activityId = 1;
    string title = 2;
    string speaker = 3;
    string timeSlot = 4;
    string location = 5;
}

message ActivityList {
    repeated Activity activities = 1;
}

message ActivityResponse {
    bool found = 1;
    Activity activity = 2;
}